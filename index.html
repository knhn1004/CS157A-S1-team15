<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpartanStudyCircle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0055A2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 22px;
      color: #0055A2;
      font-weight: 700;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab.active {
      color: #0055A2;
      border-bottom-color: #0055A2;
    }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #0055A2;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #0055A2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #004490; }

    .msg {
      font-size: 13px;
      text-align: center;
      color: #ef4444;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>📚 SpartanStudyCircle</h1>
      <p>San José State University</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="show('login', this)">Log In</div>
      <div class="tab" onclick="show('register', this)">Register</div>
    </div>

    <!-- Login -->
    <form class="form active" id="login" onsubmit="login(event)">
      <div>
        <label>Username</label>
        <input type="text" id="l-user" placeholder="Enter username" required />
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter password" required />
      </div>
      <div class="msg" id="login-msg"></div>
      <button type="submit">Log In</button>
    </form>

    <!-- Register -->
    <form class="form" id="register" onsubmit="register(event)">
      <div>
        <label>Username</label>
        <input type="text" id="r-user" placeholder="Choose a unique username" required />
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="r-email" placeholder="yourname@sjsu.edu" required />
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="r-name" placeholder="Full name" required />
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Create a password" required />
      </div>
      <div class="row">
        <div>
          <label>Major</label>
          <input type="text" id="r-major" placeholder="e.g. CS" />
        </div>
        <div>
          <label>Year</label>
          <select id="r-year">
            <option value="">—</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </div>
      </div>
      <div class="msg" id="register-msg"></div>
      <button type="submit">Create Account</button>
    </form>
  </div>

  <script>
    const users = { demo: { password: 'demo' } };

    function show(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(tab).classList.add('active');
    }

    function login(e) {
      e.preventDefault();
      const u = document.getElementById('l-user').value.trim();
      const p = document.getElementById('l-pass').value;
      const msg = document.getElementById('login-msg');
      if (users[u] && users[u].password === p) {
        msg.style.color = '#22c55e';
        msg.textContent = 'Login successful! ✓';
      } else {
        msg.style.color = '#ef4444';
        msg.textContent = 'Incorrect username or password.';
      }
    }

    function register(e) {
      e.preventDefault();
      const u = document.getElementById('r-user').value.trim();
      const msg = document.getElementById('register-msg');
      if (users[u]) {
        msg.style.color = '#ef4444';
        msg.textContent = 'Username already taken.';
        return;
      }
      users[u] = { password: document.getElementById('r-pass').value };
      msg.style.color = '#22c55e';
      msg.textContent = 'Account created! You can now log in.';
    }
  </script>
</body>
</html>
